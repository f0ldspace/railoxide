name: Telegram release notification

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare Telegram message
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const release = context.payload.release;
            const title = release.name || release.tag_name;
            const body = release.body || 'No release notes provided.';
            const url = release.html_url;

            const prefix = [
              `New release: ${title}`,
              `Tag: ${release.tag_name}`,
              '',
            ].join('\n');

            const suffix = `\n\nRelease page: ${url}`;
            const maxLength = 4096;
            const maxBodyLength = maxLength - prefix.length - suffix.length - 20;

            const trimmedBody =
              body.length > maxBodyLength
                ? `${body.slice(0, maxBodyLength)}\n\n...`
                : body;

            fs.writeFileSync('telegram-release-message.txt', `${prefix}${trimmedBody}${suffix}`);

      - name: Send Telegram release notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message_file: telegram-release-message.txt
          disable_web_page_preview: true
